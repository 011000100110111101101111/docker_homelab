# ── Mealie ───────────────────────────────────────────────────────────────────
# Recipe manager and meal planner. Web UI: http://<host>:9000
# Default credentials: changeme@example.com / MyPassword
# ─────────────────────────────────────────────────────────────────────────────

services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    container_name: mealie
    restart: unless-stopped
    profiles: [all, productivity, mealie]
    ports:
      - "9000:9000"
    volumes:
      - mealie-data:/app/data
    environment:
      - TZ=${TZ:-America/New_York}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - DB_ENGINE=postgres
      - POSTGRES_USER=mealie
      - POSTGRES_PASSWORD=${MEALIE_DB_PASSWORD:-changeme}
      - POSTGRES_DB=mealie
      - POSTGRES_SERVER=mealie-db
      - POSTGRES_PORT=5432
      - SECRET_KEY=${MEALIE_SECRET_KEY:-changeme}
    depends_on:
      mealie-db:
        condition: service_healthy

  mealie-db:
    image: postgres:15-alpine
    container_name: mealie-db
    restart: unless-stopped
    profiles: [all, productivity, mealie]
    volumes:
      - mealie-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=mealie
      - POSTGRES_PASSWORD=${MEALIE_DB_PASSWORD:-changeme}
      - POSTGRES_DB=mealie
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealie"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mealie-data:
  mealie-db-data:
