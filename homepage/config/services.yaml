---
# Homepage Services
# https://gethomepage.dev/latest/configs/services/
# Update URLs to match your domain or use localhost:<port> for direct access.

- Media:
    - Jellyfin:
        icon: jellyfin.png
        href: http://localhost:8096
        description: Media Server
        widget:
          type: jellyfin
          url: http://jellyfin:8096
          key: "{{HOMEPAGE_VAR_JELLYFIN}}"

    - Koel:
        icon: koel.png
        href: http://localhost:4533
        description: Music Streaming

- Movies & TV:
    - Jellyseerr:
        icon: jellyseerr.png
        href: http://localhost:5055
        description: Media Requests
        widget:
          type: jellyseerr
          url: http://jellyseer:5055
          key: "{{HOMEPAGE_VAR_JELLYSEER}}"

- Photos & Documents:
    - Immich:
        icon: immich.png
        href: http://localhost:2283
        description: Photo Management

    - Paperless:
        icon: paperless.png
        href: http://localhost:8001
        description: Document Management

- Productivity:
    - Mealie:
        icon: mealie.png
        href: http://localhost:9000
        description: Recipe Manager

    - n8n:
        icon: n8n.png
        href: http://localhost:5678
        description: Automation

- Books:
    - Kavita:
        icon: kavita.png
        href: http://localhost:5001
        description: Book Reader

    - Calibre Web:
        icon: calibre-web.png
        href: http://localhost:8083
        description: Book Library

- Infrastructure:
    - Nginx Proxy Manager:
        icon: nginx-proxy-manager.png
        href: http://localhost:81
        description: Reverse Proxy

    - AdGuard Home:
        icon: adguard-home.png
        href: http://localhost:3000
        description: DNS & Ad Blocking
        widget:
          type: adguard
          url: http://adguard:3000
          username: "{{HOMEPAGE_VAR_ADGUARD_USERNAME}}"
          password: "{{HOMEPAGE_VAR_ADGUARD_PASSWORD}}"

- Dev Tools:
    - NocoDB:
        icon: nocodb.png
        href: http://localhost:8082
        description: No-code Database

    - Metabase:
        icon: metabase.png
        href: http://localhost:3002
        description: Analytics

    - Pastefy:
        href: http://localhost:4567
        description: Paste Service

    - Bytestash:
        href: http://localhost:5003
        description: Code Snippets
