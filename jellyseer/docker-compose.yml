# ── Jellyseerr ────────────────────────────────────────────────────────────────
# Media request management. Web UI: http://<host>:5055
# Configure Jellyfin connection after first launch.
# ─────────────────────────────────────────────────────────────────────────────

services:
  jellyseer:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseer
    restart: unless-stopped
    profiles: [all, media, jellyseer]
    ports:
      - "5055:5055"
    volumes:
      - jellyseer-config:/app/config
    environment:
      - TZ=${TZ:-America/New_York}

volumes:
  jellyseer-config:
