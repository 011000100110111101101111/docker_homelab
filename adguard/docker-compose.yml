# ── AdGuard Home ─────────────────────────────────────────────────────────────
# Core service — starts unconditionally (no profiles).
# Web UI: http://<host>:3000  |  DNS: port 53
# First run wizard configures admin credentials (set in .env).
# ─────────────────────────────────────────────────────────────────────────────

services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "3000:3000"
    volumes:
      - adguard-work:/opt/adguardhome/work
      - adguard-conf:/opt/adguardhome/conf
    environment:
      - TZ=${TZ:-America/New_York}

volumes:
  adguard-work:
  adguard-conf:
