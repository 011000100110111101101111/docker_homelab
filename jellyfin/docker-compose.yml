# ── Jellyfin ─────────────────────────────────────────────────────────────────
# Media server. Web UI: http://<host>:8096
# Set NAS_MEDIA_PATH in .env to your media directory.
#
# NVIDIA GPU transcoding: uncomment the `deploy:` block below.
# Requires NVIDIA Container Toolkit and Docker Desktop GPU support.
# ─────────────────────────────────────────────────────────────────────────────

services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    profiles: [all, media, jellyfin]
    ports:
      - "8096:8096"
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - ${NAS_MEDIA_PATH:-./data/media}:/media:ro
    environment:
      - TZ=${TZ:-America/New_York}
    # Uncomment for NVIDIA GPU transcoding:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  jellyfin-config:
  jellyfin-cache:
