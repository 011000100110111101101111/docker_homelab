# ── Immich ───────────────────────────────────────────────────────────────────
# Photo management with AI search and face recognition.
# Web UI: http://<host>:2283
#
# Machine Learning: runs locally with NVIDIA GPU (CUDA image).
# Requires NVIDIA Container Toolkit + Docker Desktop GPU support on Windows.
# To use a remote ML server instead, comment out immich-machine-learning and
# set IMMICH_MACHINE_LEARNING_URL in immich-server's environment.
#
# Set NAS_PHOTOS_PATH in .env to your photo library directory.
# ─────────────────────────────────────────────────────────────────────────────

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    profiles: [all, photos, immich]
    ports:
      - "2283:2283"
    volumes:
      - immich-uploads:/usr/src/app/upload
      - ${NAS_PHOTOS_PATH:-./data/photos}:/usr/src/app/upload/library:ro
    environment:
      - TZ=${TZ:-America/New_York}
      - DB_HOSTNAME=immich-db
      - DB_PORT=5432
      - DB_DATABASE_NAME=${IMMICH_DB_NAME:-immich}
      - DB_USERNAME=${IMMICH_DB_USERNAME:-immich}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD:-changeme}
      - REDIS_HOSTNAME=immich-redis
      - IMMICH_MACHINE_LEARNING_URL=http://immich-machine-learning:3003
    depends_on:
      immich-db:
        condition: service_healthy
      immich-redis:
        condition: service_started

  immich-machine-learning:
    # GPU (CUDA) — comment this image and uncomment the CPU one below if no GPU
    image: ghcr.io/immich-app/immich-machine-learning:release-cuda
    # image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-machine-learning
    restart: unless-stopped
    profiles: [all, photos, immich]
    volumes:
      - immich-ml-cache:/cache
    environment:
      - TZ=${TZ:-America/New_York}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  immich-redis:
    image: redis:7-alpine
    container_name: immich-redis
    restart: unless-stopped
    profiles: [all, photos, immich]

  immich-db:
    image: tensorchord/pgvecto-rs:pg14-v0.2.0-alpha.0
    container_name: immich-db
    restart: unless-stopped
    profiles: [all, photos, immich]
    volumes:
      - immich-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${IMMICH_DB_NAME:-immich}
      - POSTGRES_USER=${IMMICH_DB_USERNAME:-immich}
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${IMMICH_DB_NAME:-immich} -U ${IMMICH_DB_USERNAME:-immich}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  immich-uploads:
  immich-ml-cache:
  immich-db-data:
