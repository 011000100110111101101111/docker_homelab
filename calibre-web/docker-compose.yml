# ── Calibre Web ──────────────────────────────────────────────────────────────
# Web UI for Calibre book library. Web UI: http://<host>:8083
# Default credentials: admin / admin123
# Set NAS_BOOKS_PATH in .env to your Calibre library directory.
# ─────────────────────────────────────────────────────────────────────────────

services:
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    restart: unless-stopped
    profiles: [all, books, calibre-web]
    ports:
      - "8083:8083"
    volumes:
      - calibre-web-config:/config
      - ${NAS_BOOKS_PATH:-./data/books}:/books
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/New_York}

volumes:
  calibre-web-config:
