# ── Nginx Proxy Manager ───────────────────────────────────────────────────────
# Core service — starts unconditionally (no profiles).
# Admin UI: http://<host>:81  |  Default: admin@example.com / changeme
# ─────────────────────────────────────────────────────────────────────────────

services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt

volumes:
  npm-data:
  npm-letsencrypt:
