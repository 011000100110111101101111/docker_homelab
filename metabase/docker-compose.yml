# ── Metabase ─────────────────────────────────────────────────────────────────
# Business intelligence and analytics. Web UI: http://<host>:3002
# ─────────────────────────────────────────────────────────────────────────────

services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    profiles: [all, dev, metabase]
    ports:
      - "3002:3000"
    volumes:
      - metabase-data:/metabase-data
    environment:
      - TZ=${TZ:-America/New_York}
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabase
      - MB_DB_PORT=5432
      - MB_DB_USER=metabase
      - MB_DB_PASS=${METABASE_DB_PASSWORD:-changeme}
      - MB_DB_HOST=metabase-db
    depends_on:
      metabase-db:
        condition: service_healthy

  metabase-db:
    image: postgres:15-alpine
    container_name: metabase-db
    restart: unless-stopped
    profiles: [all, dev, metabase]
    volumes:
      - metabase-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=metabase
      - POSTGRES_PASSWORD=${METABASE_DB_PASSWORD:-changeme}
      - POSTGRES_DB=metabase
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  metabase-data:
  metabase-db-data:
